name: Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      app:
        description: Which app to deploy
        required: true
        type: choice
        options:
          - backend
          - frontend
          - both
      image:
        description: "Image tag to deploy (e.g. sha-abc1234). Leave blank to build from HEAD."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build-backend:
    if: (inputs.app == 'backend' || inputs.app == 'both') && inputs.image == ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build and test
        run: ./gradlew build
        working-directory: apps/backend

      - uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: teamdigisos
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          dockerfile: apps/backend/Dockerfile
          docker_context: apps/backend

  deploy-backend:
    needs: [build-backend]
    if: |
      always() &&
      (inputs.app == 'backend' || inputs.app == 'both') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: apps/backend/.nais/app.yaml
          VAR: image=${{ inputs.image || needs.build-backend.outputs.image }}

  build-frontend:
    if: (inputs.app == 'frontend' || inputs.app == 'both') && inputs.image == ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/frontend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: teamdigisos
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          dockerfile: apps/frontend/Dockerfile
          docker_context: apps/frontend

  deploy-frontend:
    needs: [build-frontend]
    if: |
      always() &&
      (inputs.app == 'frontend' || inputs.app == 'both') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7 # v4.1.1

      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: apps/frontend/.nais/app.yaml
          VAR: image=${{ inputs.image || needs.build-frontend.outputs.image }}
